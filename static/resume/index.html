<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Resume</title>
  <style>
    html,
    body,
    object {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background: #111;
    }

    object {
      display: block;
      border: 0;
    }

    p {
      margin: 1rem;
      font-family: sans-serif;
    }

    a {
      color: #fff;
    }
  </style>
</head>
<body>
  <object data="/resume.pdf" type="application/pdf">
    <p><a href="/resume.pdf">Open resume PDF</a></p>
  </object>
</body>
</html>
