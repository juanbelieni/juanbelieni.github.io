{{ $url := .RelPermalink }}
{{ if .Params.externalUrl }}
  {{ $url = .Params.externalUrl }}
{{ end }}

<style>
  .compact-article-link {
    border-radius: 0.375rem;
    transition: background-color 0.05s ease;
    margin-left: -0.5rem;
    margin-right: -0.5rem;
  }

  .compact-article-link:hover {
    background-color: rgba(var(--color-neutral-500), 0.1);
  }

  .compact-article-link h3 {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .compact-article-link a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.25rem 0.5rem;
  }
</style>

<article class="compact-article-link mb-2">
  <a href="{{ $url }}" {{ if .Params.externalUrl }}target="_blank" rel="noopener noreferrer" {{ end }}>
    <h3 class="text-base font-semibold leading-tight dark:text-neutral-200">
      {{ .Title | emojify }}
    </h3>

    <span class="shrink-0 flex items-center gap-2">
      {{ if .Params.location }}
      <span class="text-xs text-neutral-500 dark:text-neutral-400 whitespace-nowrap mr-2">
        {{ .Params.location }}
      </span>
      {{ end }}
      {{ if .Date }}
      <time class="text-xs text-neutral-500 dark:text-neutral-400 whitespace-nowrap">
        {{ .Date.Format "Jan '06" }}
      </time>
      {{ end }}
    </span>
  </a>
</article>
